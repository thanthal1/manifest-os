LABEL arch
TEXT HELP
Boot the Manifest OS install medium on BIOS.
It allows you to install Manifest OS or perform system maintenance.
ENDTEXT
MENU LABEL Manifest OS install medium (%ARCH%, BIOS)
LINUX /%INSTALL_DIR%/boot/%ARCH%/vmlinuz-linux
INITRD /%INSTALL_DIR%/boot/%ARCH%/initramfs-linux.img
APPEND archisobasedir=%INSTALL_DIR% archisosearchuuid=%ARCHISO_UUID%

# Lightweight text installer (low-memory / no-GPU machines)
LABEL archtext
TEXT HELP
Boot the Manifest OS install medium with the lightweight text installer.
Use this on low-memory machines or if the graphical installer won't start.
ENDTEXT
MENU LABEL Manifest OS install medium (%ARCH%, BIOS) — ^text installer (low memory)
LINUX /%INSTALL_DIR%/boot/%ARCH%/vmlinuz-linux
INITRD /%INSTALL_DIR%/boot/%ARCH%/initramfs-linux.img
APPEND archisobasedir=%INSTALL_DIR% archisosearchuuid=%ARCHISO_UUID% manifest.text

# Accessibility boot option
LABEL archspeech
TEXT HELP
Boot the Manifest OS install medium on BIOS with speakup screen reader.
It allows you to install Manifest OS or perform system maintenance with speech feedback.
ENDTEXT
MENU LABEL Manifest OS install medium (%ARCH%, BIOS) with ^speech
LINUX /%INSTALL_DIR%/boot/%ARCH%/vmlinuz-linux
INITRD /%INSTALL_DIR%/boot/%ARCH%/initramfs-linux.img
APPEND archisobasedir=%INSTALL_DIR% archisosearchuuid=%ARCHISO_UUID% accessibility=on
